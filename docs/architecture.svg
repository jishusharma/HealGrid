<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Layer 1: Test Suites -->
  <rect x="30" y="20" width="240" height="72" rx="12" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="150" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#3b0764">API tests</text>
  <text x="150" y="68" text-anchor="middle" font-size="12" fill="#6d28d9">REST Assured</text>

  <rect x="330" y="20" width="240" height="72" rx="12" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="450" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#3b0764">Grid tests</text>
  <text x="450" y="68" text-anchor="middle" font-size="12" fill="#6d28d9">Selenium + TestNG</text>

  <rect x="630" y="20" width="240" height="72" rx="12" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="750" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#3b0764">Mobile tests</text>
  <text x="750" y="68" text-anchor="middle" font-size="12" fill="#6d28d9">BrowserStack cloud</text>

  <!-- Arrows layer 1 -> 2 -->
  <line x1="150" y1="92" x2="150" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="92" x2="450" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="92" x2="750" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: ThreadLocal DriverFactory -->
  <rect x="30" y="152" width="840" height="72" rx="12" fill="#fff1f0" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="450" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">ThreadLocal DriverFactory</text>
  <text x="450" y="202" text-anchor="middle" font-size="12" fill="#991b1b">Isolated driver per thread · zero cross-thread interference · configurable 4-level fallback</text>

  <!-- Arrows layer 2 -> 3 -->
  <line x1="200" y1="224" x2="170" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="224" x2="450" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="224" x2="730" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Execution Targets -->
  <rect x="30" y="282" width="240" height="72" rx="12" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="150" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#064e3b">Local</text>
  <text x="150" y="330" text-anchor="middle" font-size="12" fill="#047857">Maven + JVM</text>

  <rect x="330" y="282" width="240" height="72" rx="12" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="450" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#064e3b">Docker Grid</text>
  <text x="450" y="330" text-anchor="middle" font-size="12" fill="#047857">Self-healing + parallel</text>

  <rect x="630" y="282" width="240" height="72" rx="12" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="750" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#064e3b">Cloud</text>
  <text x="750" y="330" text-anchor="middle" font-size="12" fill="#047857">Android + iOS</text>

  <!-- Arrows layer 3 -> 4 -->
  <line x1="150" y1="354" x2="150" y2="408" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="354" x2="450" y2="408" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="354" x2="750" y2="408" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: Jenkins -->
  <rect x="30" y="412" width="840" height="72" rx="12" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="450" y="440" text-anchor="middle" font-size="15" font-weight="700" fill="#713f12">Jenkins CI/CD pipeline</text>
  <text x="450" y="462" text-anchor="middle" font-size="12" fill="#92400e">GitHub webhook · suite-isolated stages · catchError resilience · email alerts</text>

  <!-- Arrows layer 4 -> 5 -->
  <line x1="200" y1="484" x2="170" y2="538" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="484" x2="450" y2="538" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="484" x2="730" y2="538" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 5: Observability -->
  <rect x="30" y="542" width="240" height="62" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="150" y="568" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">PostgreSQL</text>
  <text x="150" y="588" text-anchor="middle" font-size="12" fill="#1d4ed8">Test result history</text>

  <rect x="330" y="542" width="240" height="62" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="450" y="568" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">Allure report</text>
  <text x="450" y="588" text-anchor="middle" font-size="12" fill="#1d4ed8">History + badges</text>

  <rect x="630" y="542" width="240" height="62" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="750" y="568" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">Failure Intel</text>
  <text x="750" y="588" text-anchor="middle" font-size="12" fill="#1d4ed8">Trends + root cause</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
