<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <style>
      .label { font-size: 15px; font-weight: 700; text-anchor: middle; }
      .note { font-size: 12px; text-anchor: middle; }
      .small { font-size: 11px; text-anchor: middle; }
      .arrow { stroke: #64748b; stroke-width: 1.6; marker-end: url(#arrow); }
      .band-title { font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; fill: #475569; }
    </style>
  </defs>

  <rect width="900" height="620" fill="#f8fafc"/>
  <text x="30" y="30" class="band-title">HealGrid Automation Architecture</text>

  <!-- Layer 1: Suite entrypoints -->
  <text x="30" y="60" class="band-title">Test entrypoints</text>
  <rect x="30" y="72" width="240" height="74" rx="8" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="150" y="103" class="label" fill="#312e81">API suites</text>
  <text x="150" y="124" class="note" fill="#4338ca">REST Assured + schema checks</text>

  <rect x="330" y="72" width="240" height="74" rx="8" fill="#ecfeff" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="450" y="103" class="label" fill="#164e63">Web UI suites</text>
  <text x="450" y="124" class="note" fill="#0e7490">Selenium + TestNG parallel modes</text>

  <rect x="630" y="72" width="240" height="74" rx="8" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5"/>
  <text x="750" y="103" class="label" fill="#14532d">Mobile suites</text>
  <text x="750" y="124" class="note" fill="#15803d">BrowserStack Android + iOS</text>

  <line x1="150" y1="146" x2="210" y2="194" class="arrow"/>
  <line x1="450" y1="146" x2="450" y2="194" class="arrow"/>
  <line x1="750" y1="146" x2="690" y2="194" class="arrow"/>

  <!-- Layer 2: Framework core -->
  <text x="30" y="185" class="band-title">Framework core</text>
  <rect x="30" y="198" width="840" height="86" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="450" y="228" class="label" fill="#7c2d12">Reusable Java test framework</text>
  <text x="450" y="250" class="note" fill="#9a3412">ConfigResolver, TestNG XMLs, BaseTest, DriverManager, actions, listeners</text>
  <text x="450" y="269" class="small" fill="#9a3412">ThreadLocal driver isolation keeps parallel local, Grid, and cloud runs independent</text>

  <line x1="210" y1="284" x2="150" y2="334" class="arrow"/>
  <line x1="450" y1="284" x2="450" y2="334" class="arrow"/>
  <line x1="690" y1="284" x2="750" y2="334" class="arrow"/>

  <!-- Layer 3: Execution targets -->
  <text x="30" y="326" class="band-title">Execution targets</text>
  <rect x="30" y="338" width="240" height="76" rx="8" fill="#fefce8" stroke="#facc15" stroke-width="1.5"/>
  <text x="150" y="369" class="label" fill="#713f12">Local JVM</text>
  <text x="150" y="390" class="note" fill="#854d0e">Chrome/Firefox via Maven</text>

  <rect x="330" y="338" width="240" height="76" rx="8" fill="#fdf2f8" stroke="#f472b6" stroke-width="1.5"/>
  <text x="450" y="369" class="label" fill="#831843">Docker Grid</text>
  <text x="450" y="390" class="note" fill="#be185d">Selenium nodes + Healenium healing</text>

  <rect x="630" y="338" width="240" height="76" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="750" y="369" class="label" fill="#1e3a8a">BrowserStack</text>
  <text x="750" y="390" class="note" fill="#1d4ed8">Desktop cloud + real mobile</text>

  <line x1="150" y1="414" x2="210" y2="461" class="arrow"/>
  <line x1="450" y1="414" x2="450" y2="461" class="arrow"/>
  <line x1="750" y1="414" x2="690" y2="461" class="arrow"/>

  <!-- Layer 4: CI orchestration -->
  <text x="30" y="453" class="band-title">CI orchestration</text>
  <rect x="30" y="465" width="840" height="82" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="494" class="label" fill="#0f172a">Jenkins pipeline</text>
  <text x="450" y="516" class="note" fill="#334155">GitHub webhook, Maven build, Docker Compose Grid run, optional BrowserStack mobile</text>
  <text x="450" y="535" class="small" fill="#334155">AI failure analysis can classify failures and rerun only transient candidates</text>

  <line x1="210" y1="547" x2="150" y2="578" class="arrow"/>
  <line x1="450" y1="547" x2="450" y2="578" class="arrow"/>
  <line x1="690" y1="547" x2="750" y2="578" class="arrow"/>

  <!-- Layer 5: Observability -->
  <text x="30" y="571" class="band-title">Observability and intelligence</text>
  <rect x="30" y="582" width="240" height="34" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="150" y="604" class="note" font-weight="700" fill="#075985">PostgreSQL test history</text>

  <rect x="330" y="582" width="240" height="34" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="604" class="note" font-weight="700" fill="#166534">Allure reports + history</text>

  <rect x="630" y="582" width="240" height="34" rx="8" fill="#fae8ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="750" y="604" class="note" font-weight="700" fill="#86198f">Flaky, trend, AI reports</text>
</svg>
